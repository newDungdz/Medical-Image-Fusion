name: Test MATLAB Action

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 🔥 REQUIRED

    steps:
      - uses: actions/checkout@v4

      - name: Setup MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          products: Image_Processing_Toolbox

      - name: Run test script
        uses: matlab-actions/run-command@v2
        with:
          command: |
            if ~exist('output', 'dir')
                mkdir('output');
            end

            A = uint8(rand(100,100) * 255);
            imwrite(A, 'output/test.png');

            T = table(mean(A(:)));
            writetable(T, 'output/test.csv');

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add output/*
          git commit -m "Auto: add results" || echo "No changes"
          git push