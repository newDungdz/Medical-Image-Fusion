name: Test MATLAB Action

on:
  workflow_dispatch:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          products: Image_Processing_Toolbox

      - name: Run test script
        uses: matlab-actions/run-command@v2
        with:
          command: |
            disp("MATLAB is running on GitHub!");

            % Create output folder
            if ~exist('output', 'dir')
                mkdir('output');
            end

            % Create dummy data
            A = uint8(rand(100,100) * 255);

            % Save image
            imwrite(A, 'output/test.png');

            % Save CSV
            T = table(mean(A(:)), std(double(A(:))));
            writetable(T, 'output/test.csv');

            disp("Files saved!");

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: output/
